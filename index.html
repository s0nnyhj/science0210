<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyeonjeong World</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(#9edcff 0%,#dff7ff 45%,#8bd66d 45%,#65b453 100%);
}

/* 태양 */
.sun{
    position:absolute;
    top:50px;
    right:100px;
    width:90px;
    height:90px;
    background:#ffe58a;
    border-radius:50%;
}

/* 구름 */
.cloud{
    position:absolute;
    font-size:70px;
    animation:moveCloud 35s linear infinite;
}

.c1{
    top:80px;
    left:-200px;
}

.c2{
    top:150px;
    left:-500px;
    animation-duration:45s;
}

@keyframes moveCloud{
    from{left:-300px;}
    to{left:110%;}
}


/* 나무 */
.tree{
    position:absolute;
    bottom:32%;
    font-size:150px;
}

.tree1{left:5%;}
.tree2{right:8%;}


/* 쥐 집 */
.mouse-house{
    position:absolute;
    bottom:28%;
    left:15%;
    font-size:100px;
}


/* 다리 */
.bridge{
    position:absolute;
    bottom:25%;
    left:45%;
    font-size:130px;
}


/* 동물 */
.animal{
    position:absolute;
    bottom:30%;
    font-size:55px;
    animation:walk 12s infinite linear;
}

.rabbit{
    animation-duration:14s;
}

.mouse{
    animation-duration:18s;
    animation-delay:2s;
}

.hedgehog{
    animation-duration:20s;
    animation-delay:4s;
}


@keyframes walk{
    0%{
        left:-100px;
    }

    50%{
        transform:translateY(-20px);
    }

    100%{
        left:110%;
    }
}


/* 나무 팻말 */
.sign{
    position:absolute;
    right:15%;
    bottom:25%;
    background:#9b6b3d;
    color:white;
    padding:25px 20px;
    border-radius:8px;
    border:8px solid #704522;
    font-size:20px;
    font-weight:bold;
    box-shadow:0 10px 15px rgba(0,0,0,.2);
}


/* 시작 버튼 */
.start{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
}

button{
    padding:16px 70px;
    border:none;
    border-radius:40px;
    background:white;
    color:#55734b;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 10px 20px rgba(0,0,0,.2);
}

button:hover{
    transform:scale(1.1);
}

</style>

</head>

<body>

<div class="sun"></div>

<div class="cloud c1">☁️</div>
<div class="cloud c2">☁️</div>


<div class="tree tree1">🌳</div>
<div class="tree tree2">🌲</div>


<div class="mouse-house">🏠🐭</div>

<div class="bridge">🌉</div>


<div class="animal rabbit">🐰</div>
<div class="animal mouse">🐭</div>
<div class="animal hedgehog">🦔</div>


<div class="sign">
    주인 : 현정
</div>


<div class="start">
    <button onclick="alert('Welcome!')">
        START
    </button>
</div>


</body>
</html>
