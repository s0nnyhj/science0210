<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Hyeonjeong Field</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
font-family:sans-serif;
background:linear-gradient(
#9bdcff 0%,
#dff6ff 45%,
#8bd45e 45%
);
}


/* 태양 */
.sun{
position:absolute;
top:50px;
right:100px;
width:90px;
height:90px;
background:#ffe477;
border-radius:50%;
}


/* 구름 */
.cloud{
position:absolute;
font-size:70px;
animation:cloud 35s linear infinite;
}

@keyframes cloud{
from{left:-200px;}
to{left:110%;}
}

.cloud{
top:80px;
}


/* 언덕 */
.hill{
position:absolute;
bottom:35%;
width:100%;
height:220px;
background:#79c957;
border-radius:50% 50% 0 0;
}


/* 집 */
.house{
position:absolute;
left:40%;
bottom:45%;
transition:3s;
}

.home{
font-size:160px;
}

.door{
position:absolute;
bottom:15px;
left:70px;
font-size:45px;
opacity:0;
transition:1s;
}


.open .door{
opacity:1;
}


.zoom{
animation:enter 3s forwards;
}


@keyframes enter{

0%{
transform:scale(1);
}

50%{
transform:scale(3);
}

100%{
transform:scale(7);
opacity:0;
}

}


/* 나무 */
.tree{
position:absolute;
bottom:38%;
left:10%;
font-size:130px;
}


/* 물 */
.water{
position:absolute;
bottom:0;
height:100px;
width:100%;
background:#66c8ed;
}


/* 동물 */
.animal{
position:absolute;
bottom:18%;
font-size:45px;
animation:move linear infinite;
}

@keyframes move{

from{
left:-100px;
}

to{
left:110%;
}

}

.a1{animation-duration:10s;}
.a2{animation-duration:14s;}
.a3{animation-duration:17s;}
.a4{animation-duration:12s;}
.a5{animation-duration:20s;}


/* 팻말 */
.sign{
position:absolute;
right:10%;
bottom:30%;
background:#8b5a2b;
color:white;
padding:20px;
border:6px solid #5b3518;
font-size:20px;
}


/* 버튼 */
.start{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
}


button{
padding:15px 70px;
border:none;
border-radius:40px;
background:white;
font-size:24px;
font-weight:bold;
color:#5b8050;
cursor:pointer;
}


</style>

</head>


<body>


<div class="sun"></div>

<div class="cloud">
☁️
</div>


<div class="hill"></div>


<div class="house" id="house">

<div class="home">
🏡
</div>

<div class="door">
🚪
</div>

</div>



<div class="tree">
🌳
</div>


<div class="water"></div>



<!-- 동물 5마리 -->

<div class="animal a1">🐰</div>
<div class="animal a2">🐻</div>
<div class="animal a3">🐱</div>
<div class="animal a4">🦊</div>
<div class="animal a5">🐶</div>



<div class="sign">

🌳<br>
주인 : 현정

</div>



<div class="start">

<button onclick="startGame()">
START
</button>

</div>



<script>

function startGame(){

let house=document.getElementById("house");

house.classList.add("open");


setTimeout(()=>{

document.body.classList.add("zoom");

},1000);


}

</script>


</body>
</html>
