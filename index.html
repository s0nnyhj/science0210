<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>현정의 동물 과학 놀이터</title>

<style>

body{
    margin:0;
    overflow:hidden;
    font-family:"Comic Sans MS", sans-serif;
}


/* 메인 */

#game{

    width:100vw;
    height:100vh;

    position:relative;

    background:
    linear-gradient(#9be7ff 0 35%,#7bd35b 35% 100%);

}


.grass{

    position:absolute;

    bottom:0;

    width:100%;

    height:65%;

    background:#74c850;

}



/* 판자 */

.board{

    position:absolute;

    top:50px;

    left:35%;

    transform:translateX(-50%);

    background:#ad7135;

    color:white;

    padding:20px 60px;

    border-radius:15px;

    font-size:35px;

}



/* START */

#start{

    position:absolute;

    top:150px;

    left:35%;

    transform:translateX(-50%);

    background:#ff7eb3;

    color:white;

    border:none;

    padding:15px 50px;

    font-size:30px;

    border-radius:30px;

    cursor:pointer;

}



/* 동물 */

.animal{

    position:absolute;

    font-size:100px;

    animation:bounce .8s infinite alternate;

}



@keyframes bounce{

from{
transform:translateY(0);
}

to{
transform:translateY(-60px);
}

}



.stop *{

animation-play-state:paused !important;

}



/* 메뉴 */

#menu{

    position:absolute;

    right:30px;

    top:50%;

    transform:translateY(-50%);

    width:330px;

    background:rgba(255,255,255,.9);

    padding:25px;

    border-radius:30px;

    box-shadow:0 10px 20px #555;

}



#menu h2{

    text-align:center;

    color:#4b7bec;

    font-size:35px;

}



.menuItem{

    background:#fff3cd;

    margin:12px 0;

    padding:15px;

    border-radius:20px;

    text-align:center;

    font-size:22px;

    cursor:pointer;

    transition:.3s;

}



.menuItem:hover{

    transform:scale(1.08);

    background:#ffd6e8;

}



/* 로딩 */

#loading{

    display:none;

    position:absolute;

    width:100vw;

    height:100vh;

    top:0;

    left:0;

    justify-content:center;

    align-items:center;

    flex-direction:column;

    z-index:10;

}



.pig{

    font-size:150px;

    animation:dance .5s infinite alternate;

}



@keyframes dance{

from{
transform:rotate(-20deg);
}

to{
transform:rotate(20deg) translateY(-50px);
}

}



#loadingText{

    color:white;

    font-size:45px;

    text-shadow:3px 3px 5px #555;

}



/* 완료 */

#welcome{

display:none;

position:absolute;

width:100vw;

height:100vh;

background:#e8d2ad;

top:0;

left:0;

justify-content:center;

align-items:center;

flex-direction:column;

font-size:50px;

z-index:20;

}



</style>

</head>


<body>



<div id="game">


<div class="grass"></div>


<div class="board">
주인: 현정
</div>


<button id="start">
START ▶
</button>



<!-- 동물 -->

<div class="animal" style="left:5%;bottom:20%;">🐶</div>
<div class="animal" style="left:15%;bottom:10%;">🐱</div>
<div class="animal" style="left:25%;bottom:25%;">🐰</div>
<div class="animal" style="left:35%;bottom:15%;">🐼</div>
<div class="animal" style="left:45%;bottom:30%;">🦊</div>
<div class="animal" style="left:55%;bottom:12%;">🐸</div>
<div class="animal" style="left:65%;bottom:25%;">🐻</div>
<div class="animal" style="left:75%;bottom:15%;">🐷</div>
<div class="animal" style="left:30%;bottom:5%;">🐥</div>
<div class="animal" style="left:50%;bottom:5%;">🐨</div>




<!-- 과학 메뉴 -->

<div id="menu">

<h2>📚 과학 메뉴</h2>


<div class="menuItem">1. 물질의 특성</div>

<div class="menuItem">2. 지권의 변화</div>

<div class="menuItem">3. 빛과 파동</div>

<div class="menuItem">4. 물질의 구성</div>

<div class="menuItem">5. 식물과 에너지</div>

<div class="menuItem">6. 동물과 에너지</div>

<div class="menuItem">7. 전기와 자기</div>

<div class="menuItem">8. 별과 우주</div>


</div>


</div>





<!-- 돼지 로딩 -->

<div id="loading">

<div class="pig">
🐷
</div>

<div id="loadingText">
로딩중
</div>

</div>





<!-- 완료 화면 -->

<div id="welcome">

🎉<br>

현정의 동물원 입장 완료!

</div>






<audio id="music" autoplay loop>

<source src="cute-music.mp3" type="audio/mp3">

</audio>





<script>


const start=document.getElementById("start");

const game=document.getElementById("game");

const loading=document.getElementById("loading");

const welcome=document.getElementById("welcome");

const music=document.getElementById("music");



window.onload=()=>{

music.volume=.5;

music.play().catch(()=>{});

};



start.onclick=()=>{


music.play();


game.classList.add("stop");


start.style.display="none";


loading.style.display="flex";



setTimeout(()=>{


loading.style.display="none";


game.style.display="none";


welcome.style.display="flex";


},3000);



};


</script>


</body>
</html>
