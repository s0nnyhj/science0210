<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Son'Room</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Segoe UI", Arial, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#f7efe6,#ece2d8);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            width:420px;
            background:#fffdfb;
            padding:50px;
            border-radius:24px;
            text-align:center;
            box-shadow:0 15px 35px rgba(0,0,0,.08);
        }

        h1{
            color:#6a5444;
            font-size:40px;
            margin-bottom:15px;
        }

        p{
            color:#8d7969;
            margin-bottom:35px;
            line-height:1.6;
        }

        button{
            background:#c7a487;
            color:white;
            border:none;
            padding:14px 36px;
            border-radius:30px;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#b78f70;
            transform:translateY(-2px);
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Son'Room</h1>

        <p>
            Welcome to Son'Room.<br>
            A simple and cozy personal space.
        </p>

        <button onclick="alert('Welcome to Son\\'Room!')">
            Enter
        </button>
    </div>

</body>
</html>
