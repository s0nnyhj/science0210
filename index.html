<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현정이방</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4ead7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.room{
    background:#fffaf2;
    width:420px;
    padding:50px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
    color:#6d5c49;
    margin-bottom:15px;
    font-size:36px;
}

p{
    color:#8c7b68;
    margin-bottom:35px;
    font-size:18px;
}

button{
    background:#c8a97e;
    color:white;
    border:none;
    padding:15px 35px;
    font-size:16px;
    border-radius:12px;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    background:#b89669;
    transform:scale(1.05);
}
</style>

</head>
<body>

<div class="room">
    <h1>현정이방</h1>
    <p>현정이방에 오신 것을 환영합니다.</p>

    <button onclick="alert('현정이방에 오신 것을 환영합니다!')">
        Enter
    </button>
</div>

</body>
</html>
