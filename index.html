<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
    background:linear-gradient(#9fd8ff 0%, #dff6ff 55%, #9fd47b 55%, #76b95d 100%);
}

/* 하늘 */
.sun{
    position:absolute;
    top:50px;
    right:90px;
    width:90px;
    height:90px;
    border-radius:50%;
    background:#ffe88c;
    box-shadow:0 0 40px #ffe88c;
}

.cloud{
    position:absolute;
    color:white;
    font-size:80px;
    opacity:.9;
    animation:cloud 30s linear infinite;
}

.cloud:nth-child(2){
    top:80px;
    left:-200px;
}

.cloud:nth-child(3){
    top:170px;
    left:-500px;
    animation-duration:42s;
}

@keyframes cloud{
    from{transform:translateX(0);}
    to{transform:translateX(1700px);}
}

/* 들판 */
.grass{
    position:absolute;
    bottom:0;
    width:100%;
    height:45%;
    background:linear-gradient(#8bd36d,#5ca34c);
}

/* 꽃 */
.flower{
    position:absolute;
    bottom:18%;
    font-size:28px;
}

/* 뛰어다니는 동물 */
.animal{
    position:absolute;
    bottom:22%;
    font-size:52px;
    animation:run linear infinite;
}

.rabbit{
    animation-duration:12s;
}

.cat{
    animation-duration:15s;
    animation-delay:2s;
}

.bear{
    animation-duration:18s;
    animation-delay:5s;
}

.chick{
    animation-duration:10s;
    animation-delay:1s;
}

@keyframes run{
    from{
        left:-100px;
        transform:translateY(0);
    }
    25%{
        transform:translateY(-20px);
    }
    50%{
        transform:translateY(0);
    }
    75%{
        transform:translateY(-15px);
    }
    to{
        left:110%;
        transform:translateY(0);
    }
}

/* 아래 Start 버튼 */
.start{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
}

button{
    padding:16px 55px;
    border:none;
    border-radius:40px;
    background:#ffffff;
    color:#555;
    font-size:20px;
    cursor:pointer;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
    transition:.25s;
}

button:hover{
    transform:scale(1.06);
}

/* 오른쪽 아래 */
.owner{
    position:absolute;
    right:30px;
    bottom:45px;
    color:#fff;
    font-size:18px;
    font-weight:bold;
    text-shadow:1px 1px 4px rgba(0,0,0,.3);
}
</style>
</head>

<body>

<div class="sun"></div>

<div class="cloud">☁️</div>
<div class="cloud">☁️</div>

<div class="grass"></div>

<div class="flower" style="left:8%;">🌼</div>
<div class="flower" style="left:18%;">🌸</div>
<div class="flower" style="left:35%;">🌷</div>
<div class="flower" style="left:52%;">🌼</div>
<div class="flower" style="left:70%;">🌸</div>
<div class="flower" style="left:88%;">🌷</div>

<div class="animal rabbit">🐰</div>
<div class="animal cat">🐱</div>
<div class="animal bear">🐻</div>
<div class="animal chick">🐥</div>

<div class="start">
    <button onclick="alert('Start! 🌼')">START</button>
</div>

<div class="owner">
    주인 : 현정
</div>

</body>
</html>
