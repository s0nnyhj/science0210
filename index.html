<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>현정 동물 놀이터</title>

<style>

body{
    margin:0;
    overflow:hidden;
    font-family:sans-serif;
}


/* 잔디 놀이터 */
#park{
    width:100vw;
    height:100vh;
    background:
    linear-gradient(
    skyblue 35%,
    #62c454 35%
    );
    position:relative;
}


/* START 버튼 */
#start{
    position:absolute;
    top:40px;
    left:50%;
    transform:translateX(-50%);

    padding:15px 50px;
    font-size:35px;

    border:none;
    border-radius:40px;

    background:#ff91c8;
    color:white;

    cursor:pointer;
}


/* 나무 */
#tree{
    position:absolute;
    right:150px;
    bottom:180px;
    font-size:160px;
}


/* 나무판자 */
#sign{
    position:absolute;
    right:120px;
    bottom:100px;

    background:#8b4513;
    color:white;

    padding:25px;

    font-size:30px;

    border:6px solid #5a2d0c;

    transform:rotate(-5deg);
}


/* 뛰는 동물 */
#animal{

    position:absolute;

    left:200px;
    bottom:100px;

    font-size:150px;

    animation:jump 1.5s infinite;

}


@keyframes jump{

50%{
    transform:translateY(-80px);
}

}


/* 동물 시점 화면 */

#inside{

    display:none;

    width:100vw;
    height:100vh;

    background:#74d66c;

    text-align:center;

    position:relative;

}


#player{

    position:absolute;

    font-size:170px;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

}


h1{
    padding-top:50px;
}


</style>

</head>


<body>


<div id="park">


<button id="start">
START
</button>


<div id="tree">
🌳
</div>


<div id="sign">
주인: 현정
</div>


<div id="animal">
🐰
</div>


</div>



<div id="inside">

<h1>
🐾 동물의 몸속으로 들어왔다!
</h1>

<p>
방향키로 움직여보세요
</p>


<div id="player">
🐰
</div>


</div>




<script>


const start =
document.getElementById("start");


const animals=[

"🐰",
"🐶",
"🐱",
"🦊",
"🐼",
"🐯"

];



start.onclick=function(){


let randomAnimal =
animals[
Math.floor(
Math.random()*animals.length
)
];



document.getElementById("animal")
.innerHTML=randomAnimal;



setTimeout(()=>{


document.getElementById("park")
.style.display="none";


document.getElementById("inside")
.style.display="block";


document.getElementById("player")
.innerHTML=randomAnimal;



},1500);



};




// 동물 움직이기

let x=50;
let y=50;


document.addEventListener(
"keydown",

function(e){


if(e.key==="ArrowRight"){
x+=5;
}


if(e.key==="ArrowLeft"){
x-=5;
}


if(e.key==="ArrowUp"){
y-=5;
}


if(e.key==="ArrowDown"){
y+=5;
}



document.getElementById("player")
.style.left=x+"%";


document.getElementById("player")
.style.top=y+"%";



});


</script>


</body>
</html>
