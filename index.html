<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎀 키티의 방 🎀</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Pretendard", sans-serif;
}

body{
    background:linear-gradient(180deg,#ffd9ec,#fff8fc);
    overflow-x:hidden;
}

header{
    text-align:center;
    padding:50px 20px;
}

header h1{
    font-size:48px;
    color:#ff4f91;
}

header p{
    margin-top:15px;
    color:#777;
    font-size:18px;
}

.room{
    width:90%;
    max-width:1000px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    padding:30px;
}

.card{
    background:white;
    border-radius:25px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 20px rgba(255,120,180,.2);
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.icon{
    font-size:60px;
    margin-bottom:15px;
}

.card h2{
    color:#ff5d9e;
    margin-bottom:10px;
}

.card p{
    color:#666;
    line-height:1.6;
}

button{
    margin-top:18px;
    padding:12px 24px;
    border:none;
    border-radius:30px;
    background:#ff77b7;
    color:white;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

button:hover{
    background:#ff4d97;
}

footer{
    text-align:center;
    padding:40px;
    color:#999;
}

.hearts{
    position:fixed;
    inset:0;
    pointer-events:none;
}

.hearts span{
    position:absolute;
    font-size:20px;
    animation:float 8s linear infinite;
    opacity:.7;
}

@keyframes float{
    0%{
        transform:translateY(100vh) scale(.5);
    }
    100%{
        transform:translateY(-120vh) scale(1.3);
    }
}
</style>
</head>

<body>

<div class="hearts">
    <span style="left:5%;animation-delay:0s;">💗</span>
    <span style="left:20%;animation-delay:2s;">🎀</span>
    <span style="left:35%;animation-delay:5s;">💖</span>
    <span style="left:55%;animation-delay:1s;">🌸</span>
    <span style="left:75%;animation-delay:3s;">💕</span>
    <span style="left:90%;animation-delay:6s;">🎀</span>
</div>

<header>
    <h1>🎀 키티의 방 🎀</h1>
    <p>분홍빛 가득한 귀여운 공간에 오신 것을 환영합니다!</p>
</header>

<section class="room">

    <div class="card">
        <div class="icon">🧸</div>
        <h2>인형 코너</h2>
        <p>
            포근한 인형들과 함께 쉬어가는 아늑한 공간이에요.
        </p>
        <button onclick="alert('🧸 인형들이 반갑게 인사해요!')">
            놀러가기
        </button>
    </div>

    <div class="card">
        <div class="icon">🎀</div>
        <h2>리본 장식</h2>
        <p>
            사랑스러운 핑크 리본으로 꾸며진 예쁜 방입니다.
        </p>
        <button onclick="alert('🎀 리본이 반짝반짝!')">
            구경하기
        </button>
    </div>

    <div class="card">
        <div class="icon">🩷</div>
        <h2>달콤한 카페</h2>
        <p>
            딸기 케이크와 우유 한 잔으로 힐링하는 공간.
        </p>
        <button onclick="alert('🍰 맛있는 디저트 시간!')">
            들어가기
        </button>
    </div>

    <div class="card">
        <div class="icon">🌸</div>
        <h2>비밀 정원</h2>
        <p>
            꽃향기 가득한 작은 정원에서 산책해 보세요.
        </p>
        <button onclick="alert('🌸 꽃잎이 흩날립니다!')">
            산책하기
        </button>
    </div>

</section>

<footer>
    💗 Made with Love · 키티의 방 💗
</footer>

</body>
</html>
