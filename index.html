<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>현정의 동물 놀이터</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: "Comic Sans MS", sans-serif;
    background: #8ed081;
}

#game {
    width: 100vw;
    height: 100vh;
    position: relative;
    background:
      linear-gradient(#9be7ff 0 35%, #7bd35b 35% 100%);
}

/* 잔디 느낌 */
.grass {
    position:absolute;
    bottom:0;
    width:100%;
    height:65%;
    background:#74c850;
}

/* 나무판자 */
.board {
    position:absolute;
    top:60px;
    left:50%;
    transform:translateX(-50%);
    background:#b8793b;
    color:white;
    padding:20px 60px;
    border-radius:15px;
    font-size:35px;
    box-shadow:0 8px 10px #555;
}

/* 동물 */
.animal {
    position:absolute;
    font-size:100px;
    animation: move 3s infinite alternate;
}

@keyframes move {
    from { transform:translateY(0); }
    to { transform:translateY(-25px); }
}

/* 버튼 */
#start {
    position:absolute;
    top:170px;
    left:50%;
    transform:translateX(-50%);
    padding:15px 50px;
    font-size:30px;
    border:none;
    border-radius:30px;
    background:#ff7eb3;
    color:white;
    cursor:pointer;
    box-shadow:0 5px 10px #777;
}

#start:hover {
    background:#ff4f95;
}
</style>

</head>

<body>

<div id="game">

<div class="grass"></div>

<div class="board">
    주인: 현정
</div>

<button id="start">START ▶</button>


<div class="animal" style="left:5%; bottom:20%;">🐶</div>
<div class="animal" style="left:18%; bottom:10%;">🐱</div>
<div class="animal" style="left:30%; bottom:25%;">🐰</div>
<div class="animal" style="left:43%; bottom:15%;">🐼</div>
<div class="animal" style="left:55%; bottom:30%;">🦊</div>
<div class="animal" style="left:68%; bottom:12%;">🐸</div>
<div class="animal" style="left:78%; bottom:25%;">🐻</div>
<div class="animal" style="left:88%; bottom:15%;">🐷</div>
<div class="animal" style="left:35%; bottom:5%;">🐥</div>
<div class="animal" style="left:60%; bottom:5%;">🐨</div>

</div>


<!-- 귀여운 무료 효과음/음악 파일 넣기 -->
<audio id="music" loop>
    <source src="cute-music.mp3" type="audio/mp3">
</audio>


<script>

const button = document.getElementById("start");
const music = document.getElementById("music");

button.onclick = () => {

    music.play();

    document.querySelectorAll(".animal").forEach(animal=>{
        animal.style.animationDuration =
        (Math.random()*2+1)+"s";
    });

    button.innerHTML="🐾 PLAYING!";
    button.style.background="#6bdc6b";
};

</script>

</body>
</html>
