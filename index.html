<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyeonjeong Village</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    background-image:url("background.jpg");
    background-size:cover;
    background-position:center;
    font-family:sans-serif;
}


/* 어두운 효과 */
.overlay{
    position:absolute;
    inset:0;
    background:rgba(255,255,255,0.15);
}


/* 동물 영역 */
.animal{
    position:absolute;
    bottom:18%;
    font-size:45px;
    animation:move linear infinite;
}


/* 동물 이동 */
@keyframes move{

    0%{
        left:-100px;
    }

    50%{
        transform:translateY(-25px);
    }

    100%{
        left:110%;
    }
}


/* 각 동물 속도 */
.a1{animation-duration:12s;}
.a2{animation-duration:15s;}
.a3{animation-duration:18s;}
.a4{animation-duration:20s;}
.a5{animation-duration:13s;}
.a6{animation-duration:22s;}
.a7{animation-duration:16s;}
.a8{animation-duration:25s;}
.a9{animation-duration:19s;}
.a10{animation-duration:14s;}
.a11{animation-duration:21s;}
.a12{animation-duration:17s;}
.a13{animation-duration:23s;}
.a14{animation-duration:15s;}
.a15{animation-duration:26s;}
.a16{animation-duration:18s;}
.a17{animation-duration:24s;}
.a18{animation-duration:20s;}
.a19{animation-duration:28s;}
.a20{animation-duration:30s;}


/* 위치 랜덤 */
.a2{bottom:25%}
.a3{bottom:30%}
.a4{bottom:22%}
.a5{bottom:35%}
.a6{bottom:27%}
.a7{bottom:20%}
.a8{bottom:33%}
.a9{bottom:24%}
.a10{bottom:31%}


/* 나무 팻말 */
.sign{
    position:absolute;
    right:8%;
    bottom:20%;

    background:#8b5a2b;
    color:white;

    padding:25px 30px;

    border-radius:8px;

    border:8px solid #5c3718;

    font-size:22px;
    font-weight:bold;

    transform:rotate(-3deg);

    box-shadow:0 15px 25px rgba(0,0,0,.3);
}


/* 시작 버튼 */

.start{
    position:absolute;
    bottom:45px;
    left:50%;
    transform:translateX(-50%);
}


button{

    padding:18px 80px;

    border:none;

    border-radius:50px;

    background:#fff;

    color:#59734d;

    font-size:24px;

    font-weight:bold;

    cursor:pointer;

    box-shadow:0 10px 25px rgba(0,0,0,.25);

}


button:hover{

    transform:scale(1.08);

}


</style>

</head>


<body>


<div class="overlay"></div>



<!-- 귀여운 동물 20마리 -->

<div class="animal a1">🐰</div>
<div class="animal a2">🐻</div>
<div class="animal a3">🐱</div>
<div class="animal a4">🐶</div>
<div class="animal a5">🦊</div>
<div class="animal a6">🐭</div>
<div class="animal a7">🦔</div>
<div class="animal a8">🐼</div>
<div class="animal a9">🐨</div>
<div class="animal a10">🐯</div>
<div class="animal a11">🐮</div>
<div class="animal a12">🐷</div>
<div class="animal a13">🐸</div>
<div class="animal a14">🐥</div>
<div class="animal a15">🦆</div>
<div class="animal a16">🐿️</div>
<div class="animal a17">🦉</div>
<div class="animal a18">🐹</div>
<div class="animal a19">🐱</div>
<div class="animal a20">🐰</div>



<!-- 나무 팻말 -->

<div class="sign">
    🌳<br>
    주인 : 현정
</div>



<!-- START -->

<div class="start">

<button onclick="alert('Welcome to Hyeonjeong Village!')">
START
</button>

</div>


</body>
</html>
