<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐶 멍멍이의 방</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Pretendard', sans-serif;
}

body{
    background:linear-gradient(to bottom,#fff7df,#ffe9c7);
    color:#5c4b3b;
    overflow-x:hidden;
}

header{
    text-align:center;
    padding:60px 20px;
}

header h1{
    font-size:48px;
    color:#ff9d2f;
}

header p{
    margin-top:15px;
    font-size:18px;
    color:#777;
}

.container{
    width:90%;
    max-width:1100px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    padding:40px 0;
}

.card{
    background:#fff;
    border-radius:25px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.icon{
    font-size:65px;
    margin-bottom:15px;
}

.card h2{
    color:#ff8d00;
    margin-bottom:10px;
}

.card p{
    color:#666;
    line-height:1.6;
}

button{
    margin-top:18px;
    background:#ffb347;
    color:white;
    border:none;
    padding:12px 24px;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

button:hover{
    background:#ff9800;
}

footer{
    text-align:center;
    padding:40px;
    color:#777;
}

.paw{
    position:fixed;
    font-size:24px;
    animation:float 10s linear infinite;
    opacity:.4;
}

.p1{left:10%;animation-delay:0s;}
.p2{left:30%;animation-delay:3s;}
.p3{left:50%;animation-delay:5s;}
.p4{left:70%;animation-delay:1s;}
.p5{left:90%;animation-delay:7s;}

@keyframes float{
    from{
        transform:translateY(110vh) rotate(0deg);
    }
    to{
        transform:translateY(-120vh) rotate(360deg);
    }
}
</style>
</head>

<body>

<div class="paw p1">🐾</div>
<div class="paw p2">🐾</div>
<div class="paw p3">🦴</div>
<div class="paw p4">🐾</div>
<div class="paw p5">🦴</div>

<header>
    <h1>🐶 멍멍이의 방</h1>
    <p>귀여운 강아지들과 함께 놀고 쉬는 행복한 공간입니다.</p>
</header>

<section class="container">

    <div class="card">
        <div class="icon">🦴</div>
        <h2>간식 바구니</h2>
        <p>
            바삭바삭한 뼈다귀와 맛있는 간식이 가득 담겨 있어요.
        </p>
        <button onclick="alert('🐶 냠냠! 맛있게 먹었어요!')">
            간식 먹기
        </button>
    </div>

    <div class="card">
        <div class="icon">🎾</div>
        <h2>공놀이</h2>
        <p>
            신나게 공을 던지고 뛰어놀 수 있는 놀이터입니다.
        </p>
        <button onclick="alert('🎾 멍멍! 공을 물어왔어요!')">
            놀기
        </button>
    </div>

    <div class="card">
        <div class="icon">🛏️</div>
        <h2>낮잠 침대</h2>
        <p>
            폭신한 쿠션 위에서 편안하게 낮잠을 자는 공간이에요.
        </p>
        <button onclick="alert('😴 새근새근 잠이 들어요.')">
            쉬기
        </button>
    </div>

    <div class="card">
        <div class="icon">🛁</div>
        <h2>목욕 시간</h2>
        <p>
            보송보송 깨끗하게 목욕하고 향기로운 시간을 보내요.
        </p>
        <button onclick="alert('🫧 깨끗해졌어요!')">
            목욕하기
        </button>
    </div>

</section>

<footer>
    🐾 오늘도 꼬리를 흔드는 행복한 하루! 🐾
</footer>

</body>
</html>
