<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Velvet Room</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI", sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#f8efe8,#efe5dc);
}

.card{
    width:430px;
    background:rgba(255,255,255,.7);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.6);
    border-radius:24px;
    padding:50px;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,.08);
}

.small{
    color:#b08f78;
    letter-spacing:4px;
    font-size:12px;
    text-transform:uppercase;
}

h1{
    margin:18px 0;
    color:#5d4a3d;
    font-size:42px;
}

p{
    color:#857261;
    line-height:1.7;
    margin-bottom:35px;
}

button{
    border:none;
    padding:14px 34px;
    border-radius:30px;
    background:#c6a48a;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#b68f73;
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(182,143,115,.35);
}
</style>
</head>

<body>

<div class="card">
    <div class="small">PERSONAL SPACE</div>

    <h1>Velvet Room</h1>

    <p>
        A quiet place filled with warm colors,
        soft moments, and little stories.
    </p>

    <button onclick="alert('Welcome to Velvet Room ✨')">
        Enter
    </button>
</div>

</body>
</html>
